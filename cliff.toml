# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.
"""
body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/FlarelyLegal/memory-mcp/pull/{{ commit.remote.pr_number }})){% endif %}\
{% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}
{% endfor -%}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
require_conventional = false
split_commits = false
protect_breaking_commits = true
# Only use the first line of each commit message.
commit_preprocessors = [
    { pattern = "\n.*", replace = "" },
]
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^style", group = "Styling" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\)", skip = true },
    { message = "^chore\\(deps\\)", group = "Dependencies" },
    { message = "^chore|^ci", group = "Miscellaneous" },
    { message = ".*", group = "Other" },
]
filter_commits = false
sort_commits = "oldest"
topo_order_commits = true

[bump]
# Detect semver bump from conventional commits:
#   feat  -> minor
#   fix   -> patch
#   feat! -> major
initial_tag = "v0.1.0"

[remote.github]
owner = "FlarelyLegal"
repo = "memory-mcp"
