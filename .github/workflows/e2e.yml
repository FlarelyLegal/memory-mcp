name: E2E Tests

on:
  workflow_call:
    secrets:
      CF_ACCESS_CLIENT_ID_B:
        required: true
      CF_ACCESS_CLIENT_SECRET_B:
        required: true
      API_BASE_URL_B:
        required: true

jobs:
  e2e:
    name: E2E Tests (b)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Preflight API availability
        run: |
          curl -fsS "${API_BASE_URL_B}/health"
          curl -fsS "${API_BASE_URL_B}/api/openapi.json" >/dev/null
        env:
          API_BASE_URL_B: ${{ secrets.API_BASE_URL_B }}

      - name: Run E2E tests
        run: npx playwright test --project=api
        env:
          API_TARGET: b
          API_BASE_URL_B: ${{ secrets.API_BASE_URL_B }}
          CF_ACCESS_CLIENT_ID_B: ${{ secrets.CF_ACCESS_CLIENT_ID_B }}
          CF_ACCESS_CLIENT_SECRET_B: ${{ secrets.CF_ACCESS_CLIENT_SECRET_B }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-report-b
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-junit-b
          path: test-results/junit.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: E2E Results (b)
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
