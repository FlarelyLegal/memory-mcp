name: Lint

on:
  workflow_call:

jobs:
  lint:
    name: ESLint
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Prettier
        run: |
          set -o pipefail
          echo "## Prettier Results" >> $GITHUB_STEP_SUMMARY
          if npm run format:check 2>&1 | tee output.txt; then
            echo "**All files formatted correctly**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Formatting issues detected:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: ESLint (JUnit)
        if: always()
        run: |
          mkdir -p test-results
          npx eslint src/ --format eslint-formatter-junit --output-file test-results/eslint-junit.xml || true

      - name: ESLint
        run: |
          set -o pipefail
          echo "## ESLint Results" >> $GITHUB_STEP_SUMMARY
          if npm run lint 2>&1 | tee output.txt; then
            echo "**No lint errors found**" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Lint errors detected:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eslint-junit
          path: test-results/eslint-junit.xml
          retention-days: 14

      - name: Publish lint results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: ESLint Results
          path: test-results/eslint-junit.xml
          reporter: java-junit
          fail-on-error: false
