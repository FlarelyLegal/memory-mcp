name: Unit Tests

on:
  workflow_call:

jobs:
  unit-test:
    name: Vitest
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: npx vitest run

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-junit
          path: test-results/vitest-junit.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: Unit Test Results
          path: test-results/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false
