name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Label PR by files
        id: labeler
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Label PR by size
        run: |
          ADDITIONS=${{ github.event.pull_request.additions }}
          DELETIONS=${{ github.event.pull_request.deletions }}
          TOTAL=$((ADDITIONS + DELETIONS))

          gh label create "size/xs" --color "3CBF00" --description "Extra small PR" 2>/dev/null || true
          gh label create "size/s" --color "5D9801" --description "Small PR" 2>/dev/null || true
          gh label create "size/m" --color "7F7203" --description "Medium PR" 2>/dev/null || true
          gh label create "size/l" --color "A14C05" --description "Large PR" 2>/dev/null || true
          gh label create "size/xl" --color "C32607" --description "Extra large PR" 2>/dev/null || true

          gh pr edit "$PR_NUMBER" --remove-label "size/xs,size/s,size/m,size/l,size/xl" 2>/dev/null || true

          if [ $TOTAL -lt 10 ]; then
            LABEL="size/xs"
          elif [ $TOTAL -lt 50 ]; then
            LABEL="size/s"
          elif [ $TOTAL -lt 200 ]; then
            LABEL="size/m"
          elif [ $TOTAL -lt 500 ]; then
            LABEL="size/l"
          else
            LABEL="size/xl"
          fi

          gh pr edit "$PR_NUMBER" --add-label "$LABEL"
          echo "Added label: $LABEL ($TOTAL lines changed)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Summary
        run: |
          echo "## PR Labeler Results" >> $GITHUB_STEP_SUMMARY
          echo "Labels have been automatically applied based on changed files and PR size." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [labeler.yml](.github/labeler.yml) for file-based label rules." >> $GITHUB_STEP_SUMMARY
