name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  typecheck:
    name: TypeCheck
    uses: ./.github/workflows/typecheck.yml

  build:
    name: Build
    needs: [lint, typecheck]
    uses: ./.github/workflows/build.yml

  e2e:
    name: E2E Tests
    needs: [build]
    uses: ./.github/workflows/e2e.yml
    secrets:
      CF_ACCESS_CLIENT_ID_B: ${{ secrets.CF_ACCESS_CLIENT_ID_B }}
      CF_ACCESS_CLIENT_SECRET_B: ${{ secrets.CF_ACCESS_CLIENT_SECRET_B }}
      API_BASE_URL_B: ${{ secrets.API_BASE_URL_B }}
