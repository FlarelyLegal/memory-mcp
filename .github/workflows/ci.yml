name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'schemas/**'
              - 'tests/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'wrangler*.jsonc'
              - 'playwright.config.ts'
              - 'vitest.config.ts'

  lint:
    name: Lint
    uses: ./.github/workflows/lint.yml

  typecheck:
    name: TypeCheck
    uses: ./.github/workflows/typecheck.yml

  unit-test:
    name: Unit Tests
    needs: [lint, typecheck]
    uses: ./.github/workflows/unit-test.yml

  build:
    name: Build
    needs: [lint, typecheck]
    uses: ./.github/workflows/build.yml

  e2e:
    name: E2E Tests
    needs: [build, changes]
    if: needs.changes.outputs.src == 'true'
    uses: ./.github/workflows/e2e.yml
    secrets:
      CF_ACCESS_CLIENT_ID_B: ${{ secrets.CF_ACCESS_CLIENT_ID_B }}
      CF_ACCESS_CLIENT_SECRET_B: ${{ secrets.CF_ACCESS_CLIENT_SECRET_B }}
      API_BASE_URL_B: ${{ secrets.API_BASE_URL_B }}
