name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    # Gate 1: command text (precise word-boundary matching)
    # Gate 2: author must be repo OWNER or org MEMBER (blocks random commenters)
    if: |
      (
        github.event.comment.body == '/oc' ||
        github.event.comment.body == '/opencode' ||
        startsWith(github.event.comment.body, '/oc ') ||
        startsWith(github.event.comment.body, '/oc\n') ||
        startsWith(github.event.comment.body, '/opencode ') ||
        startsWith(github.event.comment.body, '/opencode\n') ||
        contains(github.event.comment.body, ' /oc ') ||
        contains(github.event.comment.body, ' /oc\n') ||
        endsWith(github.event.comment.body, ' /oc') ||
        contains(github.event.comment.body, ' /opencode ') ||
        contains(github.event.comment.body, ' /opencode\n') ||
        endsWith(github.event.comment.body, ' /opencode')
      ) && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: opencode-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      id-token: write # Required: OpenCode OIDC auth (non-negotiable)
      contents: read # Read-only: OpenCode App token handles commits
      pull-requests: write # Needed for PR comments; App token handles pushes
      issues: write # Needed for issue comments
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Check PR requirements
        id: check-pr
        if: github.event.issue.pull_request || github.event.pull_request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.issue.number }}" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          PR_DATA=$(gh pr view "$PR_NUMBER" --json baseRefName,headRepositoryOwner,headRepository)
          BASE_REF=$(echo "$PR_DATA" | jq -r '.baseRefName')
          HEAD_OWNER=$(echo "$PR_DATA" | jq -r '.headRepositoryOwner.login')
          REPO_OWNER="${{ github.repository_owner }}"

          if [ "$HEAD_OWNER" != "$REPO_OWNER" ]; then
            echo "Skipping: PR is from a fork ($HEAD_OWNER != $REPO_OWNER)"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=PR is from a fork ($HEAD_OWNER)" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$BASE_REF" != "main" ]; then
            echo "Skipping: PR targets '$BASE_REF', not 'main'"
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "reason=PR targets '$BASE_REF', not 'main'" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        if: (github.event.issue.pull_request || github.event.pull_request) && steps.check-pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ steps.check-pr.outputs.pr_number }}"
          gh pr checkout "$PR_NUMBER"

      - name: Run opencode
        if: steps.check-pr.outputs.skip != 'true'
        uses: anomalyco/opencode/github@a9fea49cebbe985ae1aea412e2d99d9f52668f19 # latest
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CLOUDFLARE_GATEWAY_ID }}
        with:
          model: cloudflare-ai-gateway/anthropic/claude-opus-4-6

      - name: Job summary
        if: always()
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          SKIP: ${{ steps.check-pr.outputs.skip }}
          SKIP_REASON: ${{ steps.check-pr.outputs.reason }}
          PR_NUM: ${{ steps.check-pr.outputs.pr_number || github.event.issue.number }}
        run: |
          # Sanitize comment body for markdown table (truncate, strip pipes/newlines)
          SAFE_BODY=$(echo "$COMMENT_BODY" | head -c 200 | tr '|\n\r' '   ' | sed 's/`/\\`/g')
          {
            echo "## OpenCode Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Triggered by** | @${COMMENT_USER} |"
            echo "| **Comment** | \`${SAFE_BODY}\` |"
            if [ "$SKIP" = "true" ]; then
              echo "| **Status** | Skipped |"
              echo "| **Reason** | ${SKIP_REASON} |"
            else
              echo "| **Status** | Ran |"
              echo "| **PR** | #${PR_NUM} |"
              echo "| **Model** | \`claude-opus-4-6\` |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
