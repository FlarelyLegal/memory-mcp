name: E2E Browser Tests (B Manual)

on:
  workflow_dispatch:

jobs:
  browser:
    name: Browser Tests (b)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Preflight API availability
        run: curl -fsS "${API_BASE_URL_B}/health"
        env:
          API_BASE_URL_B: ${{ secrets.API_BASE_URL_B }}

      - name: Run browser tests
        run: npx playwright test --project=browser
        env:
          API_TARGET: b
          API_BASE_URL_B: ${{ secrets.API_BASE_URL_B }}
          CF_ACCESS_CLIENT_ID_B: ${{ secrets.CF_ACCESS_CLIENT_ID_B }}
          CF_ACCESS_CLIENT_SECRET_B: ${{ secrets.CF_ACCESS_CLIENT_SECRET_B }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: page-screenshots-b
          path: tests/e2e/screenshots/
          retention-days: 30

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: browser-report-b
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: browser-junit-b
          path: test-results/junit.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@bdab7eb6dfb6be17ac3d72352f67e559a72c8db1 # v2.5.0
        with:
          name: Browser Results (b)
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
