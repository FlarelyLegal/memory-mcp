name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        with:
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 14 days if there is no further activity."
          stale-pr-message: "This PR has been inactive for 30 days. It will be closed in 14 days if there is no further activity."
          close-issue-message: "Closed due to inactivity. Reopen if still relevant."
          close-pr-message: "Closed due to inactivity. Reopen if still relevant."
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-issue-close: 14
          days-before-pr-close: 14
          exempt-issue-labels: "pinned,security,health-check"
          exempt-pr-labels: "pinned,security"
          operations-per-run: 30
