name: Close Stale Issues and PRs

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Log actions without making changes"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  close-stale:
    runs-on: ubuntu-latest
    steps:
      - name: Handle stale issues and PRs
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const DAYS_WARNING = 45
            const DAYS_CLOSE = 60
            const STALE_LABEL = 'stale'
            const { owner, repo } = context.repo
            const dryRun = context.payload.inputs?.dryRun === "true"

            const warningCutoff = new Date(Date.now() - DAYS_WARNING * 24 * 60 * 60 * 1000)
            const closeCutoff = new Date(Date.now() - DAYS_CLOSE * 24 * 60 * 60 * 1000)

            const actions = { warned: [], closed: [], reactivated: [] }

            core.info(`Dry run mode: ${dryRun}`)
            core.info(`Warning cutoff: ${warningCutoff.toISOString()}`)
            core.info(`Close cutoff: ${closeCutoff.toISOString()}`)

            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
              sort: "updated",
              direction: "asc",
            })

            for (const pr of prs) {
              await processItem(pr, 'PR')
            }

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              per_page: 100,
              sort: "updated",
              direction: "asc",
            })

            const actualIssues = issues.filter(i => !i.pull_request)

            for (const issue of actualIssues) {
              await processItem(issue, 'issue')
            }

            async function processItem(item, type) {
              const lastUpdated = new Date(item.updated_at)
              const hasStaleLabel = item.labels.some(l => l.name === STALE_LABEL)
              const number = item.number

              if (hasStaleLabel) {
                const events = await github.paginate(github.rest.issues.listEvents, {
                  owner,
                  repo,
                  issue_number: number,
                })
                const staleLabelEvent = events.filter(e =>
                  e.event === 'labeled' && e.label?.name === STALE_LABEL
                ).pop()

                if (staleLabelEvent) {
                  const staleLabelAddedAt = new Date(staleLabelEvent.created_at)
                  const bufferMs = 5 * 60 * 1000
                  const hasRealActivity = lastUpdated > new Date(staleLabelAddedAt.getTime() + bufferMs)

                  if (hasRealActivity) {
                    core.info(`${type} #${number} is active again, removing stale label`)
                    actions.reactivated.push(`${type} #${number}`)
                    if (!dryRun) {
                      await github.rest.issues.removeLabel({
                        owner,
                        repo,
                        issue_number: number,
                        name: STALE_LABEL,
                      }).catch(() => {})
                    }
                    return
                  }

                  const daysUntilClose = DAYS_CLOSE - DAYS_WARNING
                  const closeCutoffForStale = new Date(Date.now() - daysUntilClose * 24 * 60 * 60 * 1000)
                  if (staleLabelAddedAt <= closeCutoffForStale) {
                    const closeComment = `Closing this ${type} because it has had no updates for more than ${DAYS_CLOSE} days. If you plan to continue working on it, feel free to reopen.`

                    actions.closed.push(`${type} #${number}`)
                    if (dryRun) {
                      core.info(`[dry-run] Would close ${type} #${number}`)
                      return
                    }

                    await github.rest.issues.createComment({
                      owner,
                      repo,
                      issue_number: number,
                      body: closeComment,
                    })

                    await github.rest.issues.update({
                      owner,
                      repo,
                      issue_number: number,
                      state: "closed",
                    })

                    core.info(`Closed ${type} #${number}`)
                  }
                }
                return
              }

              if (lastUpdated <= warningCutoff) {
                const warningComment = `This ${type} has been marked as stale because it has had no activity for ${DAYS_WARNING} days. It will be closed in ${DAYS_CLOSE - DAYS_WARNING} days if no further activity occurs.`

                actions.warned.push(`${type} #${number}`)
                if (dryRun) {
                  core.info(`[dry-run] Would mark ${type} #${number} as stale`)
                  return
                }

                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: number,
                  labels: [STALE_LABEL],
                })

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: number,
                  body: warningComment,
                })

                core.info(`Marked ${type} #${number} as stale`)
              }
            }

            let summary = `## Stale Issues/PRs Report\n\n`
            summary += dryRun ? `**Mode:** Dry run (no changes made)\n\n` : ``

            if (actions.warned.length === 0 && actions.closed.length === 0 && actions.reactivated.length === 0) {
              summary += `**No stale items found**\n`
            } else {
              if (actions.warned.length > 0) {
                summary += `### Marked as stale (${actions.warned.length})\n`
                actions.warned.forEach(item => { summary += `- ${item}\n` })
                summary += `\n`
              }
              if (actions.closed.length > 0) {
                summary += `### Closed (${actions.closed.length})\n`
                actions.closed.forEach(item => { summary += `- ${item}\n` })
                summary += `\n`
              }
              if (actions.reactivated.length > 0) {
                summary += `### Reactivated (${actions.reactivated.length})\n`
                actions.reactivated.forEach(item => { summary += `- ${item}\n` })
              }
            }

            await core.summary.addRaw(summary).write()
