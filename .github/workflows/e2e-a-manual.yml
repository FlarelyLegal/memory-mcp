name: E2E Tests (A Manual)

on:
  workflow_dispatch:

jobs:
  e2e_a:
    name: E2E Tests (a)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run E2E tests
        run: npx playwright test --project=api
        env:
          API_TARGET: a
          API_BASE_URL_A: ${{ secrets.API_BASE_URL_A }}
          CF_ACCESS_CLIENT_ID_A: ${{ secrets.CF_ACCESS_CLIENT_ID_A }}
          CF_ACCESS_CLIENT_SECRET_A: ${{ secrets.CF_ACCESS_CLIENT_SECRET_A }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report-a
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-junit-a
          path: test-results/junit.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: E2E Results (a)
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
