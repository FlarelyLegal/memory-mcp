name: E2E Tests (A Manual)

on:
  workflow_dispatch:

jobs:
  e2e_a:
    name: E2E Tests (a)
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run E2E tests
        run: npx playwright test --project=api
        env:
          API_TARGET: a
          API_BASE_URL_A: ${{ secrets.API_BASE_URL_A }}
          CF_ACCESS_CLIENT_ID_A: ${{ secrets.CF_ACCESS_CLIENT_ID_A }}
          CF_ACCESS_CLIENT_SECRET_A: ${{ secrets.CF_ACCESS_CLIENT_SECRET_A }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-report-a
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: e2e-junit-a
          path: test-results/junit.xml
          retention-days: 14

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: E2E Results (a)
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false
