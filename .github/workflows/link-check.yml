name: Link Check

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".docs.toml"
      - "scripts/check-docs.sh"
  pull_request:
    paths:
      - "**/*.md"
      - ".docs.toml"
      - "scripts/check-docs.sh"
  workflow_dispatch:

jobs:
  link-check:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check docs
        run: bash scripts/check-docs.sh
