name: Link Check

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".lychee.toml"
  pull_request:
    paths:
      - "**/*.md"
      - ".lychee.toml"
  schedule:
    - cron: "0 8 * * 1" # Monday 08:00 UTC -- catch external link rot
  workflow_dispatch:

jobs:
  link-check:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >-
            --no-progress
            '**/*.md'
          fail: true
