name: Link Check

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".docs.toml"
      - "scripts/check-docs.sh"
  pull_request:
    paths:
      - "**/*.md"
      - ".docs.toml"
      - "scripts/check-docs.sh"
  workflow_dispatch:

jobs:
  link-check:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check docs
        run: bash scripts/check-docs.sh
